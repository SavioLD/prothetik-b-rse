  <!-- ============ Hauptbereich ============ -->
  <main class="main">

    <div class="topbar">
      <div>
        <h1>Nachrichten</h1>
        <p>Wähle links eine Praxis aus, um den Chat zu öffnen.</p>
      </div>
      <div class="topbar-actions">
        <a class="btn btn-outline btn-sm" href="dashboard.html" title="Demo-Rolle wechseln">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 16V4m0 0L3 8m4-4l4 4m6 4v12m0 0l4-4m-4 4l-4-4"/></svg>
          Demo: als Praxis ansehen
        </a>
      </div>
    </div>

    <div class="chat-layout">
      <!-- Konversationsliste -->
      <aside class="card convo-panel">
        <div class="convo-search">
          <input type="text" placeholder="Praxis suchen …" id="convoSearch">
        </div>
        <div class="convo-list" id="convoList"></div>
      </aside>

      <!-- Aktiver Chat -->
      <section class="chat-panel">
        <div class="chat-head" id="chatHead"></div>
        <div class="chat-body" id="chatBody"></div>
        <div class="chat-input">
          <button class="icon-btn" title="Datei anhängen" onclick="PB.toast('Dateianhang – in der Demo deaktiviert')">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
          </button>
          <button class="icon-btn" title="Formular senden" onclick="PB.toast('Digitales Formular wird angehängt …')">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          </button>
          <input type="text" id="chatInput" placeholder="Nachricht schreiben …" autocomplete="off">
          <button class="icon-btn send" id="chatSend" title="Senden">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
          </button>
        </div>
      </section>
    </div>

  </main>
</div>

<script src="app.js"></script>
<script>
  const CHATS = [
    {
      name: 'Praxis Dr. Röckle', initials: 'SR', grad: 'linear-gradient(135deg,#5BA4EC,#2BB3B1)',
      sub: 'Auftrag #A-1019 · Zirkon-Krone, Zahn 14', unread: 1,
      messages: [
        { who: 'me',   text: 'Guten Morgen Dr. Röckle! Wir haben den Auftrag angenommen – Modell ist bereits gegossen. 🦷', time: '09:12' },
        { who: 'them', text: 'Super, danke! Bitte Farbton A2 mit leichter Transluzenz im Schneidebereich.', time: '09:30' },
        { who: 'me',   text: 'Notiert – A2 mit Transluzenz. Ist im Auftragsformular ergänzt.', time: '09:41' },
        { who: 'me',   text: 'Update: Gerüst ist gefräst und passt hervorragend aufs Modell.', time: '11:05' },
        { who: 'them', text: 'Sieht top aus! Können wir die Lieferung am 14.07. einhalten?', time: '11:18' }
      ]
    },
    {
      name: 'Zahnzentrum Stuttgart-Mitte', initials: 'ZS', grad: 'linear-gradient(135deg,#1A5CA3,#5BA4EC)',
      sub: 'Auftrag #A-1016 · Modellguss UK', unread: 1,
      messages: [
        { who: 'me',   text: 'Der Modellguss ist in Arbeit – Gerüstanprobe wäre nächste Woche möglich.', time: '09:10' },
        { who: 'them', text: 'Klingt gut. Passt der Liefertermin 18.07. weiterhin?', time: '09:40' }
      ]
    },
    {
      name: 'Praxis Dr. Wagner', initials: 'DW', grad: 'linear-gradient(135deg,#2FA866,#2BB3B1)',
      sub: 'Auftrag #A-1014 · Vollprothese UK', unread: 0,
      messages: [
        { who: 'me',   text: 'Die Wachsaufstellung ist fertig – Fotos sind im Auftrag hinterlegt.', time: 'Gestern' },
        { who: 'them', text: 'Vielen Dank, sieht sehr gut aus. Patientin ist happy mit der Zahnform!', time: 'Gestern' }
      ]
    },
    {
      name: 'MVZ Dental Neckartal', initials: 'MN', grad: 'linear-gradient(135deg,#E89B2F,#2F86E0)',
      sub: 'Auftrag #A-1013 · Aufbissschiene', unread: 0,
      messages: [
        { who: 'them', text: 'Anprobe am Donnerstag 10:30 Uhr bestätigt.', time: 'Dienstag' },
        { who: 'me',   text: 'Perfekt, die Schiene ist bis dahin fertig poliert. Bis Donnerstag!', time: 'Dienstag' }
      ]
    }
  ];

  PB.initInbox({
    listId: 'convoList', headId: 'chatHead', bodyId: 'chatBody',
    inputId: 'chatInput', sendId: 'chatSend',
    chats: CHATS, meInitials: 'DS'
  });

  document.getElementById('convoSearch').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('#convoList .convo-item').forEach(el => {
      el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  });
</script>
