<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2173C9">
<title>Nachrichten – Prothetik Börse</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="fonts.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- ============ Sidebar (Zahnarztpraxis) ============ -->
  <aside class="sidebar">
    <a class="logo" href="index.html">
      <span class="mark">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.1 2 5 4.6 5 8.1c0 2.4 1 3.9 1.5 5.9.6 2.2.5 8 2.6 8 1.9 0 1.4-5.2 2.9-5.2s1 5.2 2.9 5.2c2.1 0 2-5.8 2.6-8 .5-2 1.5-3.5 1.5-5.9C19 4.6 15.9 2 12 2z"/></svg>
      </span>
      <span>Prothetik<em>Börse</em></span>
    </a>

    <div class="nav-label">Praxis-Menü</div>
    <a class="nav-item" href="dashboard.html">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Dashboard
    </a>
    <a class="nav-item" href="anfrage-neu.html">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      Neue Anfrage
    </a>
    <a class="nav-item" href="auftraege.html">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Aufträge
      <span class="count">8</span>
    </a>
    <a class="nav-item active" href="nachrichten.html">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
      Nachrichten
      <span class="count">3</span>
    </a>
    <a class="nav-item" href="labore.html">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      Meine Labore
    </a>

    <div class="nav-label">Demnächst</div>
    <a class="nav-item" href="#" onclick="PB.toast('Die Jobbörse folgt in Ausbau-Stufe 2'); return false;">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
      Jobbörse
      <span class="badge badge-teal" style="margin-left:auto;">Bald</span>
    </a>

    <div class="spacer"></div>
    <div class="user-chip">
      <div class="avatar">SR</div>
      <div>
        <b>Praxis Dr. Röckle</b>
        <small>Zahnarzt · 78628 Rottweil</small>
      </div>
    </div>
  </aside>

  <!-- ============ Hauptbereich ============ -->
  <main class="main">

    <div class="topbar">
      <div>
        <h1>Nachrichten</h1>
        <p>Wähle links ein Labor aus, um den Chat zu öffnen.</p>
      </div>
      <div class="topbar-actions">
        <a class="btn btn-outline btn-sm" href="techniker.html" title="Demo-Rolle wechseln">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 16V4m0 0L3 8m4-4l4 4m6 4v12m0 0l4-4m-4 4l-4-4"/></svg>
          Demo: als Labor ansehen
        </a>
      </div>
    </div>

    <div class="chat-layout">
      <!-- Konversationsliste -->
      <aside class="card convo-panel">
        <div class="convo-search">
          <input type="text" placeholder="Labor suchen …" id="convoSearch">
        </div>
        <div class="convo-list" id="convoList"></div>
      </aside>

      <!-- Aktiver Chat -->
      <section class="chat-panel">
        <div class="chat-head" id="chatHead"></div>
        <div class="chat-body" id="chatBody"></div>
        <div class="chat-input">
          <button class="icon-btn" title="Datei anhängen" onclick="PB.toast('Dateianhang – in der Demo deaktiviert')">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
          </button>
          <button class="icon-btn" title="Formular senden" onclick="PB.toast('Digitales Formular wird angehängt …')">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          </button>
          <input type="text" id="chatInput" placeholder="Nachricht schreiben …" autocomplete="off">
          <button class="icon-btn send" id="chatSend" title="Senden">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
          </button>
        </div>
      </section>
    </div>

  </main>
</div>

<script src="app.js"></script>
<script>
  const CHATS = [
    {
      name: 'Dentallabor Sommer', initials: 'DS', grad: 'linear-gradient(135deg,#2BB3B1,#2F86E0)',
      sub: 'Auftrag #A-1019 · Zirkon-Krone, Zahn 14', unread: 2,
      messages: [
        { who: 'them', text: 'Guten Morgen Dr. Röckle! Wir haben den Auftrag angenommen – Modell ist bereits gegossen. 🦷', time: '09:12' },
        { who: 'me',   text: 'Super, danke! Bitte Farbton A2 mit leichter Transluzenz im Schneidebereich.', time: '09:30' },
        { who: 'them', text: 'Notiert – A2 mit Transluzenz. Ist im Auftragsformular ergänzt und dokumentiert.', time: '09:41' },
        { who: 'them', text: 'Kurzes Update: Gerüst ist gefräst und passt hervorragend aufs Modell. Foto ist im Auftrag hinterlegt.', time: '11:05' },
        { who: 'me',   text: 'Sieht top aus! Können wir die Lieferung am 14.07. einhalten?', time: '11:18' },
        { who: 'them', text: 'Ja, das passt. Verblendung machen wir Anfang nächster Woche. 👍', time: '11:22' }
      ]
    },
    {
      name: 'Zahntechnik Maier', initials: 'ZM', grad: 'linear-gradient(135deg,#5BA4EC,#1A5CA3)',
      sub: 'Auftrag #A-1018 · Teilprothese UK', unread: 1,
      messages: [
        { who: 'me',   text: 'Guten Morgen! Wie ist der Stand bei der Teilprothese?', time: '08:55' },
        { who: 'them', text: 'Modell ist eingetroffen, wir starten morgen mit der Aufstellung.', time: '10:14' }
      ]
    },
    {
      name: 'Labor Kessler & Co.', initials: 'LK', grad: 'linear-gradient(135deg,#E89B2F,#D9534F)',
      sub: 'Auftrag #A-1015 · Aufbissschiene', unread: 0,
      messages: [
        { who: 'them', text: 'Die Aufbissschiene ist fertig und geht heute in den Versand.', time: 'Gestern' },
        { who: 'me',   text: 'Perfekt, danke für die schnelle Umsetzung!', time: 'Gestern' },
        { who: 'them', text: 'Versandt – Sendungsverfolgung ist im Auftrag hinterlegt. 📦', time: 'Gestern' }
      ]
    },
    {
      name: 'CeraDent Studio', initials: 'CD', grad: 'linear-gradient(135deg,#2FA866,#2BB3B1)',
      sub: 'Auftrag #A-0996 · Inlay, Zahn 36 (abgeschlossen)', unread: 0,
      messages: [
        { who: 'them', text: 'Danke für die Farbfotos – damit konnten wir den Übergang perfekt anpassen.', time: 'Montag' },
        { who: 'me',   text: 'Das Inlay saß auf Anhieb. Gerne wieder!', time: 'Montag' }
      ]
    }
  ];

  PB.initInbox({
    listId: 'convoList', headId: 'chatHead', bodyId: 'chatBody',
    inputId: 'chatInput', sendId: 'chatSend',
    chats: CHATS, meInitials: 'SR'
  });

  /* Konversationen durchsuchen */
  document.getElementById('convoSearch').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('#convoList .convo-item').forEach(el => {
      el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  });
</script>
</body>
</html>
